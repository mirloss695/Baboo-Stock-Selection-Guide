<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個股明細</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #555555; 
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 900px;
            overflow-x: auto; 
        }

        #pageTitle {
            color: #444444;
            border-bottom: 2px solid #eeeeee;
            padding-bottom: 15px;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            font-size: 15px;
            text-align: center;
            white-space: nowrap;
        }

        th, td { border: 1px solid #dddddd; padding: 12px 8px; }
        th { background-color: #f8f9fa; color: #444444; font-weight: 600; }
        .divider-row td { background-color: #eeeeee; height: 4px; padding: 0; border: none; }
        .summary-row { background-color: #fdfdfd; font-weight: bold; }

        .dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            vertical-align: middle;
        }
        .dot-red { background-color: #d9534f; }
        .dot-green { background-color: #5cb85c; }
        .text-red { color: #d9534f; font-weight: bold; }
        .text-black { color: #222222; font-weight: bold; }
        .error-msg { color: #d9534f; text-align: center; font-weight: bold; padding: 20px; }

        /* 新增：共振與無共振的文字樣式區分 */
        .text-resonance { color: #444444; font-weight: bold; }
        .text-no-resonance { color: #aaaaaa; } /* 淺灰色 */
    </style>
</head>
<body>

    <div class="container">
        <h2 id="pageTitle">載入中...</h2>
        
        <h3 id="dateRangeTitle">起訖日期：載入中...</h3>
        <table id="dataTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>開盤價</th>
                    <th>收盤價</th>
                    <th>最高價</th>
                    <th>最低價</th>
                    <th>成交量</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <h3>技術分析指標</h3>
        <table id="analysisTable">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>是否共振</th>
                    <th>K 棒性質</th>
                    <th>漲/跌</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const stockFullName = urlParams.get('stock') || '未知證券';
        const stockCode = stockFullName.split(' ')[0]; 
        
        document.title = stockFullName;
        document.getElementById('pageTitle').textContent = stockFullName;

        function parseNum(val) {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            return parseFloat(String(val).replace(/,/g, ''));
        }

        const dailyDataStr = sessionStorage.getItem('dailyData');

        if (!dailyDataStr) {
            document.querySelector('.container').innerHTML = '<div class="error-msg">找不到資料，請回到首頁重新上傳檔案。</div>';
        } else {
            const allDailyData = JSON.parse(dailyDataStr);
            
            let displayData = allDailyData.filter(row => {
                const rowCode = String(row['證券代號'] || row['代號'] || row['Code'] || '').trim();
                return rowCode === stockCode;
            }).map(row => {
                return {
                    date: row['日期'] || row['年月日'] || row['Date'] || '未知日期',
                    open: parseNum(row['開盤價'] || row['Open']),
                    close: parseNum(row['收盤價'] || row['Close']),
                    high: parseNum(row['最高價'] || row['High']),
                    low: parseNum(row['最低價'] || row['Low']),
                    volume: parseNum(row['成交股數'] || row['成交量'] || row['Volume'])
                };
            });

            if (displayData.length === 0) {
                document.querySelector('.container').innerHTML = '<div class="error-msg">找不到該檔股票的詳細資料，請確認資料格式。</div>';
            } else {
                document.getElementById('dateRangeTitle').textContent = 
                    `起訖日期：${displayData[0].date} — ${displayData[displayData.length-1].date}`;

                const dataTbody = document.querySelector('#dataTable tbody');
                const analysisTbody = document.querySelector('#analysisTable tbody');

                let weekHigh = -Infinity, weekLow = Infinity, weekVolume = 0;
                const weekOpen = displayData[0].open;
                const weekClose = displayData[displayData.length-1].close;

                for (let i = 0; i < displayData.length; i++) {
                    const current = displayData[i];
                    const previous = i > 0 ? displayData[i - 1] : null; 

                    if (current.high > weekHigh) weekHigh = current.high;
                    if (current.low < weekLow) weekLow = current.low;
                    weekVolume += current.volume;

                    // 表格一：基礎資料
                    const dataRow = `
                        <tr>
                            <td>${current.date}</td>
                            <td>${current.open}</td>
                            <td>${current.close}</td>
                            <td>${current.high}</td>
                            <td>${current.low}</td>
                            <td>${current.volume}</td>
                        </tr>
                    `;
                    dataTbody.insertAdjacentHTML('beforeend', dataRow);

                    // --- 表格二：運算 ---
                    let resonanceHtml = '–';
                    let kBarNatureHtml = '–';
                    let upDownHtml = '–';

                    if (previous) {
                        // 1. 漲/跌 (K = 當日收盤價 - 前一日收盤價)
                        const k = current.close - previous.close;
                        if (k > 0) upDownHtml = '<span class="dot dot-red"></span>';
                        else if (k < 0) upDownHtml = '<span class="dot dot-green"></span>';

                        // 2. 共振判斷
                        const p1 = Math.abs(current.close - current.open);
                        const p2 = (current.high - current.low) / 2;
                        const p = p1 - p2;
                        const h = current.volume - previous.volume;

                        if ((p > 0 && h > 0) || (p < 0 && h < 0)) {
                            // 套用新的樣式
                            resonanceHtml = '<span class="text-resonance">共振</span>';
                        } else if (p != 0 || h != 0) {
                            // 套用淺灰色樣式
                            resonanceHtml = '<span class="text-no-resonance">無共振</span>';
                        }

                        // 3. K 棒性質判斷
                        const cond1 = (previous.close - previous.open > 0) && (current.close - current.open > 0) && (current.close - previous.close > 0);
                        const cond2 = (previous.close - previous.open < 0) && (current.close - current.open < 0) && (current.close - previous.close < 0);
                        const cond3 = (current.close - current.open < 0) && (current.close - previous.close > 0);
                        const cond4 = (current.close - current.open > 0) && (current.close - previous.close < 0);

                        if (cond1) kBarNatureHtml = '<span class="text-red">上漲的紅 K</span>';
                        else if (cond2) kBarNatureHtml = '<span class="text-black">下跌的黑 K</span>';
                        else if (cond3) kBarNatureHtml = '<span class="text-black">上漲的黑 K</span>';
                        else if (cond4) kBarNatureHtml = '<span class="text-red">下跌的紅 K</span>';
                    }

                    const analysisRow = `
                        <tr>
                            <td>${current.date}</td>
                            <td>${resonanceHtml}</td>
                            <td>${kBarNatureHtml}</td>
                            <td>${upDownHtml}</td>
                        </tr>
                    `;
                    analysisTbody.insertAdjacentHTML('beforeend', analysisRow);
                }

                // 總計列
                const dataSummaryHtml = `
                    <tr class="divider-row"><td colspan="6"></td></tr>
                    <tr class="summary-row">
                        <td>一週</td>
                        <td>${weekOpen}</td>
                        <td>${weekClose}</td>
                        <td>${weekHigh}</td>
                        <td>${weekLow}</td>
                        <td>${weekVolume}</td>
                    </tr>
                `;
                dataTbody.insertAdjacentHTML('beforeend', dataSummaryHtml);

                const weekK = weekClose - weekOpen;
                let weekUpDownHtml = '–';
                if (weekK > 0) weekUpDownHtml = '<span class="dot dot-red"></span>';
                else if (weekK < 0) weekUpDownHtml = '<span class="dot dot-green"></span>';

                const analysisSummaryHtml = `
                    <tr class="divider-row"><td colspan="4"></td></tr>
                    <tr class="summary-row">
                        <td>一週</td>
                        <td>–</td>
                        <td>–</td>
                        <td>${weekUpDownHtml}</td>
                    </tr>
                `;
                analysisTbody.insertAdjacentHTML('beforeend', analysisSummaryHtml);
            }
        }
    </script>
</body>
</html>
