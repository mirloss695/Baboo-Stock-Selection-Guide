<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>證券交易資料分析系統</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #555555; 
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2, h3 {
            color: #444444; 
            border-bottom: 2px solid #eeeeee;
            padding-bottom: 10px;
        }

        .file-group {
            margin-bottom: 25px;
        }

        .file-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* 調整：增加左側外距讓整體往右移，並設定燈號與按鈕的間距 */
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px; 
            margin-left: 10px;
        }

        /* 燈號的基礎樣式 */
        .status-light {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #e0e0e0; 
            transition: all 0.3s ease;
            /* 避免燈號被壓縮變形 */
            flex-shrink: 0; 
        }

        /* 燈號點亮時的樣式 (亮螢光綠 + 發光光暈) */
        .status-light.active {
            background-color: #00e600;
            box-shadow: 0 0 10px rgba(0, 230, 0, 0.7);
        }

        button {
            background-color: #f0f0f0;
            color: #555555;
            border: 1px solid #cccccc;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #e0e0e0;
        }

        #analyzeBtn {
            background-color: #e8ecef;
            border-color: #b8c2cc;
            width: 100%;
            margin-top: 10px;
        }

        #statusMsg {
            margin-top: 15px;
            font-size: 14px;
            color: #d9534f;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="uploadSection">
            <h2>資料上傳</h2>
            
            <div class="file-group">
                <label for="fileA">上傳每天交易資料 (a)：</label>
                <div class="input-wrapper">
                    <span class="status-light" id="lightA" title="尚未上傳"></span>
                    <input type="file" id="fileA" accept=".csv, .xls, .xlsx">
                </div>
            </div>
            
            <div class="file-group">
                <label for="fileB">上傳一周交易資料 (b)：</label>
                <div class="input-wrapper">
                    <span class="status-light" id="lightB" title="尚未上傳"></span>
                    <input type="file" id="fileB" accept=".csv, .xls, .xlsx">
                </div>
            </div>

            <button id="analyzeBtn">開始分析</button>
            <div id="statusMsg"></div>
        </div>

        <div id="resultSection" class="hidden">
            <h3>分析完成</h3>
            <p>請選擇要查看的結果：</p>
            <button onclick="openResultPage('連續上漲至少兩天')">【連續上漲至少兩天】</button>
            <button onclick="openResultPage('連續下跌至少兩天')">【連續下跌至少兩天】</button>
        </div>
    </div>

    <script>
        // 處理檔案 A 的燈號
        document.getElementById('fileA').addEventListener('change', function() {
            const light = document.getElementById('lightA');
            if (this.files.length > 0) {
                light.classList.add('active'); 
                light.title = "已選擇檔案";
            } else {
                light.classList.remove('active'); 
                light.title = "尚未上傳";
            }
        });

        // 處理檔案 B 的燈號
        document.getElementById('fileB').addEventListener('change', function() {
            const light = document.getElementById('lightB');
            if (this.files.length > 0) {
                light.classList.add('active');
                light.title = "已選擇檔案";
            } else {
                light.classList.remove('active');
                light.title = "尚未上傳";
            }
        });

        const analyzeBtn = document.getElementById('analyzeBtn');
        const uploadSection = document.getElementById('uploadSection');
        const resultSection = document.getElementById('resultSection');
        const statusMsg = document.getElementById('statusMsg');

        function readExcelFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
                        resolve(jsonData);
                    } catch (error) {
                        reject(error);
                    }
                };
                reader.onerror = function(error) { reject(error); };
                reader.readAsArrayBuffer(file);
            });
        }

        analyzeBtn.addEventListener('click', async function() {
            const fileA = document.getElementById('fileA').files[0];
            const fileB = document.getElementById('fileB').files[0];

            if (!fileA || !fileB) {
                statusMsg.style.color = '#d9534f';
                statusMsg.textContent = '提示：請確認 (a) 與 (b) 兩份檔案皆已亮起綠燈。';
                return;
            }

            statusMsg.style.color = '#555555';
            statusMsg.textContent = '資料解析中，請稍候...';
            analyzeBtn.disabled = true;

            try {
                const [dataA, dataB] = await Promise.all([
                    readExcelFile(fileA),
                    readExcelFile(fileB)
                ]);

                sessionStorage.setItem('dailyData', JSON.stringify(dataA));
                sessionStorage.setItem('weeklyData', JSON.stringify(dataB));

                uploadSection.classList.add('hidden');
                resultSection.classList.remove('hidden');
                statusMsg.textContent = '解析成功！請選擇分析條件。';

            } catch (error) {
                console.error(error);
                statusMsg.style.color = '#d9534f';
                statusMsg.textContent = '檔案解析失敗，請確認檔案格式是否正確。';
                analyzeBtn.disabled = false;
            }
        });

        function openResultPage(conditionTitle) {
            const targetUrl = `filterResult.html?title=${encodeURIComponent(conditionTitle)}`;
            window.open(targetUrl, '_blank');
        }
    </script>
</body>
</html>
